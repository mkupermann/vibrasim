# Frozen acceptance contract — Plan A.
# All thresholds and seeds locked here. Changes require a CONCEPT amendment
# commit. F1-F5 read this file, not their own constants.

[seeds]
calibration = [42, 43, 44]            # used during development to set defaults
held_out = [7, 100, 314, 999, 2024, 17, 77, 256, 512, 1337]   # used for the actual acceptance run; never tuned against

[F1]
duration_sim_sec = 300                # 5-min sim (post-A.5: 3600 for full 60-min)
in_band_low_mult = 0.5
in_band_high_mult = 2.0
in_band_min_pct = 0.80

[F2]
training_sim_sec = 300
measurement_radius = 8.0
ratio_min = 3.0       # bootstrap 95% CI lower bound

[F3a]
silent_sim_sec = 300
weak_strength_max = 5.0
decay_min_pct = 0.80

[F3b]
training_sim_sec = 600
silent_sim_sec = 300
strong_strength_min = 50.0
persistence_min_pct = 0.80
n_strong_required = 5     # if fewer formed, F3b is a PRECONDITION FAILURE, not a trivial pass

[F4]
sustained_sim_sec = 1800
target_max_level_min = 7

[F5]
duration_sim_sec = 300
conservation_tolerance_pct = 0.20    # |Σ generated − Σ decayed − Σ bound| / Σ generated ≤ 20%

[provenance]
# Honest pre-registration provenance. The Methods/Stats reviewer flagged that
# this file (commit f6c84f7) was created AFTER config-tuning commits
# f0f8911 (initial F1 attempt) and 7bc2412 (re-tune for real substrate dynamics).
# Calibration seeds {42, 43, 44} were used implicitly during that config search
# (rng_seed=42 was the simulator's hardcoded default). The held-out seeds
# {7, 100, 314, 999, 2024, ...} were NEVER used during config tuning; they remain
# clean for acceptance evaluation.
locked_at = "2026-05-06"
locked_at_commit = "f6c84f7"
calibration_seeds_were_used_during_config_search = true   # for rigour
held_out_seeds_were_used_during_config_search = false     # the actual contract
config_tuning_log_commits = ["f0f8911", "7bc2412"]

[M4]
duration_sim_min = 10.0
n_pairs = 50
test_phase_sim_sec = 30.0
cosine_min = 0.5

[M5]
n_trials = 100
n_seeds = 5
ci_confidence = 0.95
margin_min = 0.10

[provenance.plan_E]
calibration_seeds = [42, 43, 44]
held_out_seeds = [7, 100, 314, 999, 2024]
thresholds_frozen_at_commit = "<filled at first calibration commit>"
