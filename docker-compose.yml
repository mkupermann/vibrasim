services:
  postgres:
    image: postgres:16-alpine
    container_name: vibrasim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibrasim
      POSTGRES_USER: vibrasim
      POSTGRES_PASSWORD: vibrasim
    ports:
      - "5433:5432"
    volumes:
      - vibrasim_pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibrasim -d vibrasim"]
      interval: 5s
      timeout: 3s
      retries: 10

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    container_name: vibrasim-streamlit
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VIBRASIM_DSN: "host=postgres port=5432 dbname=vibrasim user=vibrasim password=vibrasim"
    ports:
      - "8502:8501"
    volumes:
      - ./app:/srv/app:ro
      - ./db:/srv/db:ro

volumes:
  vibrasim_pg_data:
