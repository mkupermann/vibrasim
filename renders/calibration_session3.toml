# Session 3 calibration result (Phase 1 v2) — ATOM-PRODUCING CONFIG
#
# Calibrated from the overnight sweep on 2026-05-06 with rng_seed=42.
# 120 simulated seconds produced:
#   - 104 electrons max alive (first at t=0.32s)
#   - 10 pairs max alive (first at t=2.95s)
#   - 2 triads alive (first at t=6.28s)
#   - 1 atom alive (first at t=13.40s)
#
# This is the first config in the calibration sweep that produces an atom
# within reasonable wall time, satisfying CONCEPT.md v2 §5 Phase 1
# success criterion 1 (reproducible atom formation).

box_size = [80.0, 80.0, 80.0]
n_initial_vibrations = 400
n_vibrations_max = 1024
n_nodes_max = 512

r_1 = 5.0
r_2 = 30.0
freq_tolerance = 0.025

pair_decay_time = 60.0
triad_decay_time = 600.0

# Ambient regeneration off — keeps population constant for clean observation.
# Calibrating ambient comes after atom formation works.
lambda_gen = 0.0
lambda_dec = 0.0

# Default speeds match the calibration sweep (10–50 units/s). Slower speeds
# also work but delay atom formation — keep these at default for the
# documented "first atom at t=13.4s" reproducibility claim.
# (Overriding speed_min/speed_max changes the dynamics significantly.)
