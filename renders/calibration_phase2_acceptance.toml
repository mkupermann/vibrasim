# Phase 2 acceptance calibration — first config that meets ≥5 distinct
# molecule species (CONCEPT.md v2 §5 Phase 2).
#
# Discovered by the overnight teammate sweep on 2026-05-06. Single-knob
# delta from session_3b: freq_tolerance widened from 0.030 to 0.200.
#
