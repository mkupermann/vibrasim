# Compared to renders/calibration_session3.toml (1 atom in 240 s), this
# config is dramatically more productive: same physics, denser world,
# more vibrations, and slightly looser binding rules at the same r_1/r_2
# ratio.
#
# Use this config to test Phase 2's "≥ 5 distinct molecule species"
# acceptance criterion in long-duration runs.

