# Session 3b calibration — Phase 2 unlocking config
#
# Discovered in the overnight multi-atom sweep on 2026-05-06. With rng_seed=42
# in 30 s simulated time:
#   - 93 electrons max alive
#   - 36 pairs max alive
#   - 25 triads max alive
#   - 18 atoms max alive (21 total formed) — first atom at t = 0.6 s
#   - level-5 molecule formed by t = 5.43 s
